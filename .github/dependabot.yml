version: 2
updates:
  # --- Python (api/) ---
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    ignore:
      - dependency-name: "protobuf"
        update-types: ["version-update:semver-major"]
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  # --- Go worker ---
  - package-ecosystem: gomod
    directory: /worker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  # --- Go relay ---
  - package-ecosystem: gomod
    directory: /relay
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  # --- React frontend ---
  - package-ecosystem: npm
    directory: /webui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  # --- GitHub Actions ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # --- Docker base images (api/) ---
  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    ignore:
      - dependency-name: "python"
        versions: [">=3.14"]
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # --- Docker base images (worker/) ---
  - package-ecosystem: docker
    directory: /worker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # --- Docker base images (relay/) ---
  - package-ecosystem: docker
    directory: /relay
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # --- Docker images (compose.yaml) ---
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
