name: webui-e2e

# Playwright E2E over the critical webui flows against a REAL API + Postgres
# (issue #491). Separate from webui.yml (the fast unit gate) and from e2e.yml
# (the Go data-plane / container-driver harness): this is the slow,
# browser-driven path with its own Node + browser + API + Postgres setup and
# its own path filters, so it lives in its own workflow rather than bolted onto
# either.
#
# Orchestration is delegated to scripts/run_webui_e2e.sh (one source of truth,
# shared with local `make webui-e2e`, issue #501): it migrates, boots uvicorn
# against the Postgres service (MCD_E2E_REUSE_DB=1), seeds the admin, and runs
# Playwright. The UI is the Vite dev server, which Playwright starts itself
# (playwright.config.ts) so the dev-server proxy keeps the browser same-origin
# with the API. No worker runs, so a created server parks unassigned/stopped —
# the suite asserts creation, not a running state.

on:
  pull_request:
    paths:
      - "webui/**"
      - "api/**"
      - "Makefile"
      - "scripts/run_webui_e2e.sh"
      - ".github/workflows/webui-e2e.yml"
  push:
    branches: [main]
    paths:
      - "webui/**"
      - "api/**"
      - "Makefile"
      - "scripts/run_webui_e2e.sh"
      - ".github/workflows/webui-e2e.yml"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # PostgreSQL service for the real API. Image digest-pinned per
    # docs/dev/DEPENDENCIES.md, reusing the api.yml-vetted digest.
    services:
      postgres:
        # postgres:17.6-alpine (pushed 2025-10-24, outside the cooldown).
        image: postgres@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_USER: mcsd
          POSTGRES_PASSWORD: mcsd
          POSTGRES_DB: mcsd_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcsd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The orchestration script owns the API boot config (signing key, control
      # plane off, storage, the per-IP registration cap, #362); CI only points it
      # at the Postgres service to reuse rather than start its own container.
      MCD_E2E_REUSE_DB: "1"
      MCD_E2E_DATABASE_URL: postgresql+asyncpg://mcsd:mcsd@localhost:5432/mcsd_e2e
    steps:
      # Action versions are pinned to a commit SHA per docs/dev/DEPENDENCIES.md
      # (pinning + 7-day cooldown), reusing the api.yml / webui.yml / worker.yml
      # vetted pins.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (caches the uv-managed toolchain)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Set up Node (caches npm via the lockfile)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: webui/.nvmrc
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Pin npm (matches engines.npm so lockfiles stay deterministic)
        working-directory: webui
        run: npm install -g npm@11.13.0

      - name: Install webui (reproducible, from lockfile)
        working-directory: webui
        run: npm ci

      - name: Sync API (pinned Python + deps from uv.lock)
        working-directory: api
        run: uv sync --locked

      # Cache the Playwright browser download, keyed off the pinned Playwright
      # version so a bump re-downloads. The default browsers path on Linux.
      - name: Resolve Playwright version
        id: pw
        working-directory: webui
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium (with OS deps)
        working-directory: webui
        run: npx playwright install --with-deps chromium

      - name: Run E2E (migrate, boot the API, seed admin, run Playwright)
        run: scripts/run_webui_e2e.sh

      - name: API log on failure
        if: failure()
        run: cat /tmp/webui-e2e-uvicorn.log || true
