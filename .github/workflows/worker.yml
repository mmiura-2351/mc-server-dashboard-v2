name: worker

on:
  pull_request:
    paths:
      - "worker/**"
      - "Makefile"
      - ".github/workflows/worker.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "Makefile"
      - ".github/workflows/worker.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: worker

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go (caches the module + build cache)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: worker/go.mod

      - name: Format check (gofmt)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt: the following files are not formatted:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint (pinned)
        run: GOBIN="$(pwd)/.bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Lint (golangci-lint)
        run: ./.bin/golangci-lint run

      - name: Test
        run: go test ./...
