name: worker

on:
  pull_request:
    paths:
      - "worker/**"
      - "proto/contract/**"
      - "proto/mcsd/**"
      - "Makefile"
      - ".github/workflows/worker.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "proto/contract/**"
      - "proto/mcsd/**"
      - "Makefile"
      - ".github/workflows/worker.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: worker

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go (caches the module + build cache)
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: worker/go.mod

      # The golangci-lint pin is the single source of truth in the Makefile
      # (GOLANGCI_VERSION). Read it out so the cache key and the install step
      # below both follow that one pin.
      - name: Resolve pinned golangci-lint version
        id: golangci
        working-directory: ${{ github.workspace }}
        run: |
          version="$(sed -n 's/^GOLANGCI_VERSION := //p' Makefile)"
          if [ -z "$version" ]; then
            echo "could not read GOLANGCI_VERSION from Makefile" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache golangci-lint binary
        id: cache-golangci
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: worker/.bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-${{ steps.golangci.outputs.version }}

      - name: Format check (gofmt)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt: the following files are not formatted:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint (pinned)
        if: steps.cache-golangci.outputs.cache-hit != 'true'
        run: GOBIN="$(pwd)/.bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ steps.golangci.outputs.version }}

      - name: Lint (golangci-lint)
        run: ./.bin/golangci-lint run

      # The -race flag is the gate from #323 (worker is concurrency-heavy);
      # -coverprofile + the go tool cover summary make coverage visible in the
      # CI log (#325). No coverage floor enforced.
      - name: Test (race detector + coverage)
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
