name: bedrock-e2e

# Protocol-level Bedrock relay tunnel E2E (epic #1540, issue #1547): the REAL
# relay/internal/bedrock.Listener and the REAL
# worker/internal/adapters/bedrocktunnel.Manager, driven as two coordinating
# `go test -tags e2e` processes (they cannot share one process -- each
# module's internal/ packages are importable only from within their own module
# tree), forwarding to a REAL Docker container running a fake-Geyser RakNet
# responder (worker/test/e2e/stub-geyser) instead of real Geyser -- a
# Modrinth/GeyserMC download would make CI flaky, and real Geyser+Floodgate
# behavior was already validated live (epic #1540 issue #1542).
#
# Separate from relay-e2e.yml (the Java relay protocol-level E2E against the
# full compose stack + a real Postgres/API) and from e2e.yml (the data-plane /
# container-driver harness): this suite needs neither Postgres nor the API --
# the API's OpenBedrockTunnel dispatch and ValidateBedrockTunnel credential
# minting (issue #1544) are out of scope here (a stub validator stands in; see
# relay/test/e2e/bedrock_relay_e2e_test.go's package doc) -- so it only needs
# Go (both modules) and a Docker daemon.
#
# Orchestration is delegated to scripts/run_bedrock_e2e.sh (one source of
# truth, shared with local `make bedrock-e2e`): it builds the stub-geyser
# image, starts the relay-side listener in the background, waits for it to be
# ready, then runs the worker-side assertions in the foreground.

# Whole-module path filters (mirroring relay-e2e.yml): the tunnel code under
# test imports packages across both modules (e.g. relay/internal/bedrock pulls
# in relay/internal/ipcaps and relay/internal/netutil), so narrower per-package
# filters would silently skip this suite on a change to a transitive dependency.
on:
  pull_request:
    paths:
      - "relay/**"
      - "worker/**"
      - "proto/mcsd/bedrocktunnel/**"
      - "scripts/run_bedrock_e2e.sh"
      - ".github/workflows/bedrock-e2e.yml"
  push:
    branches: [main]
    paths:
      - "relay/**"
      - "worker/**"
      - "proto/mcsd/bedrocktunnel/**"
      - "scripts/run_bedrock_e2e.sh"
      - ".github/workflows/bedrock-e2e.yml"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per docs/dev/DEPENDENCIES.md
      # (pinning + 7-day cooldown), reusing the relay-e2e.yml/e2e.yml-vetted pins.
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Both relay/go.mod and worker/go.mod declare `go 1.26`; one toolchain
      # install covers the two `go test` invocations the orchestrator runs.
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: worker/go.mod
          cache-dependency-path: |
            worker/go.sum
            relay/go.sum

      - name: Run the Bedrock relay tunnel E2E suite
        # The GitHub-hosted runner ships a working Docker daemon (no compose
        # needed here, unlike relay-e2e.yml).
        run: scripts/run_bedrock_e2e.sh
