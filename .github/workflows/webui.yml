name: webui

on:
  pull_request:
    paths:
      - "webui/**"
      - "Makefile"
      - ".github/workflows/webui.yml"
  push:
    branches: [main]
    paths:
      - "webui/**"
      - "Makefile"
      - ".github/workflows/webui.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: webui

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node (caches npm via the lockfile)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: webui/.nvmrc
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Pin npm (matches engines.npm so lockfiles stay deterministic)
        run: npm install -g npm@11.13.0

      - name: Install (reproducible, from lockfile)
        run: npm ci

      - name: Lint (Biome check)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build (production)
        run: npm run build
