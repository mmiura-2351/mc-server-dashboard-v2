name: relay-e2e

# Protocol-level relay E2E (epic #659, issue #962): a minimal Java-edition
# Minecraft client driven against the REAL relay running in the compose stack
# with the `relay` profile, end to end through the real API's RelayService and a
# real Postgres. Separate from relay.yml (the fast Go unit/lint gate) and from
# e2e.yml (the Go data-plane / container-driver harness): this is the slow,
# whole-stack, Docker-compose path with its own path filters.
#
# Orchestration is delegated to scripts/run_relay_e2e.sh (one source of truth,
# shared with local `make relay-e2e`): it builds the images, brings the stack up
# with the relay profile, generates the tunnel TLS material, seeds an admin + a
# stopped server, and runs the protocol-level Go suite. The GitHub-hosted runner
# ships a working Docker daemon, so the harness builds and runs in-place.
#
# Scope note: the status-running, status-cache, and login game_session paths need
# a server the worker has actually BOOTED (a real Minecraft launch behind the
# tunnel — the API start path has no stub-JAR seam), which is too heavy for CI, so
# this harness does not exercise them; the relay's running-server protocol logic
# is covered in-process by relay/test/integration_test.go.

on:
  pull_request:
    paths:
      - "relay/**"
      - "api/src/mc_server_dashboard_api/fleet/**"
      - "compose.yaml"
      - "scripts/run_relay_e2e.sh"
      - "scripts/seed_relay_e2e.py"
      - "scripts/compose.relay-e2e.yaml"
      - ".github/workflows/relay-e2e.yml"
  push:
    branches: [main]
    paths:
      - "relay/**"
      - "api/src/mc_server_dashboard_api/fleet/**"
      - "compose.yaml"
      - "scripts/run_relay_e2e.sh"
      - "scripts/seed_relay_e2e.py"
      - "scripts/compose.relay-e2e.yaml"
      - ".github/workflows/relay-e2e.yml"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per docs/dev/DEPENDENCIES.md
      # (pinning + 7-day cooldown), reusing the e2e.yml / relay.yml vetted pins.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go (for the protocol-level client)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: relay/go.mod

      - name: Run the relay protocol-level E2E suite
        # The orchestrator resolves the host docker group GID itself (the worker
        # container needs it for the mounted socket), so no extra env is needed.
        run: scripts/run_relay_e2e.sh
