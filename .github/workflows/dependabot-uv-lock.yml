name: dependabot-uv-lock

on:
  pull_request:
    branches: [main]
    paths:
      - "api/pyproject.toml"

permissions:
  contents: write

jobs:
  regenerate:
    if: startsWith(github.head_ref, 'dependabot/pip/')
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Regenerate uv.lock
        working-directory: api
        run: uv lock

      - name: Commit and push if changed
        run: |
          git diff --exit-code api/uv.lock && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/uv.lock
          git commit -m "chore(deps): regenerate uv.lock"
          git push
