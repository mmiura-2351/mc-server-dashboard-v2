name: dependabot-uv-lock

on:
  pull_request:
    branches: [main]
    paths:
      - "api/pyproject.toml"

permissions:
  contents: write

jobs:
  regenerate:
    if: startsWith(github.head_ref, 'dependabot/pip/')
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Regenerate uv.lock
        working-directory: api
        run: uv lock

      - name: Commit and push if changed
        run: |
          git diff --exit-code api/uv.lock && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/uv.lock
          git commit -m "chore(deps): regenerate uv.lock"
          git push
