name: proto

on:
  pull_request:
    # `labeled`/`unlabeled` are added to the default
    # opened/synchronize/reopened set so applying or removing the `breaking`
    # label re-runs this gate (label changes don't re-trigger the workflow by
    # default). See proto/README.md, breaking-change section.
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "proto/**"
      - "worker/internal/controlplane/**"
      - "relay/internal/genproto/**"
      - "api/src/mcsd/**"
      - "api/pyproject.toml"
      - "api/uv.lock"
      - "Makefile"
      - ".github/workflows/proto.yml"
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "worker/internal/controlplane/**"
      - "relay/internal/genproto/**"
      - "api/src/mcsd/**"
      - "api/pyproject.toml"
      - "api/uv.lock"
      - "Makefile"
      - ".github/workflows/proto.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so `buf breaking` can resolve the origin/main baseline.
          fetch-depth: 0

      - name: Set up Go (for the pinned Go protoc plugins)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: worker/go.mod

      - name: Set up uv (for the pinned Python generators)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Set up buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: 1.70.0
          github_token: ${{ github.token }}

      - name: Sync api dev toolchain (grpcio-tools, mypy-protobuf)
        working-directory: api
        run: uv sync --locked

      - name: Lint (buf)
        run: make proto-lint

      # Skipped when the PR carries the `breaking` label: that label marks an
      # intentional contract break that drives a MAJOR (0.x: MINOR) bump per
      # docs/dev/RELEASING.md Section 1. On push-to-main the expression is false
      # (no pull_request payload), so the gate still self-compares (harmless).
      - name: Breaking-change check skipped (breaking label)
        if: contains(github.event.pull_request.labels.*.name, 'breaking')
        run: |
          echo "::notice title=buf-breaking skipped::PR carries the 'breaking' label — intentional contract break, skipping the buf-breaking gate (version bump per docs/dev/RELEASING.md Section 1)."

      - name: Breaking-change check (against origin/main)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'breaking') }}
        run: make proto-breaking

      - name: Drift check (regenerate and diff)
        run: make proto-check
