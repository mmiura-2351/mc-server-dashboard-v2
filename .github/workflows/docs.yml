name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_docs.py"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/check_docs.py"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The checker is pure stdlib python3 (ubuntu-latest ships it); no setup
      # action or dependency install is needed.
      - name: Docs checker self-test
        run: python3 scripts/check_docs.py --self-test

      - name: Docs conventions (links, section-mark glyph, v1 term)
        run: python3 scripts/check_docs.py
