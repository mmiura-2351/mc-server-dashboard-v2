name: api

on:
  pull_request:
    paths:
      - "api/**"
      - "proto/contract/**"
      - "Makefile"
      - ".github/workflows/api.yml"
  push:
    branches: [main]
    paths:
      - "api/**"
      - "proto/contract/**"
      - "Makefile"
      - ".github/workflows/api.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: api

jobs:
  check:
    runs-on: ubuntu-latest
    # PostgreSQL service for the DB-touching integration tests
    # (tests/integration). Image digest-pinned per docs/dev/DEPENDENCIES.md
    # (pinning + 7-day cooldown).
    services:
      postgres:
        # postgres:17.6-alpine (pushed 2025-10-24, outside the cooldown).
        image: postgres@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_USER: mcsd
          POSTGRES_PASSWORD: mcsd
          POSTGRES_DB: mcsd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcsd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv (caches the uv-managed toolchain)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Sync (pinned Python + dev toolchain from uv.lock)
        run: uv sync --locked

      # Fast, non-DB guard against migration numbering collisions between
      # parallel PRs (issue #284). The pull_request event checks out the merge
      # ref (actions/checkout's default: PR combined with the target branch),
      # so this sees PR + current main together and fails the moment main moves
      # under a stale migration. Limitation: CI does not auto-re-run when main
      # moves, so the collision is caught at the next push or re-run; merge-time
      # protection is GitHub's "require branches up to date" setting, which is
      # out of repo scope. `alembic heads` is the authoritative single-head
      # check; check_migrations.py adds duplicate revision-id / filename-prefix
      # detection and is self-tested (--self-test).
      - name: Migration guard (single head, no number collisions)
        run: |
          ../scripts/check_migrations.py --self-test
          ../scripts/check_migrations.py
          heads="$(uv run alembic heads --resolve-dependencies)"
          count="$(printf '%s\n' "$heads" | grep -c .)"
          if [ "$count" -ne 1 ]; then
            echo "expected exactly one alembic head, found $count:" >&2
            printf '%s\n' "$heads" >&2
            exit 1
          fi

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Import contracts (import-linter)
        run: uv run lint-imports

      - name: Test (pytest)
        # MCD_TEST_DATABASE_URL enables the DB-touching integration tests
        # (tests/integration) against the Postgres service; the unit suite is
        # hermetic and ignores it. The test session treats this as a base URL
        # and creates a fresh per-run `<dbname>_<uuid>` database off it (#379),
        # so the service's fresh `mcsd_test` is just the maintenance connection.
        env:
          MCD_TEST_DATABASE_URL: postgresql+asyncpg://mcsd:mcsd@localhost:5432/mcsd_test
        # Coverage is CI-only (#325): local `uv run pytest` / `make api-test`
        # stay fast and uncluttered; CI surfaces the number and the missing
        # lines per source path. No floor enforced.
        run: uv run pytest --cov=src --cov-report=term-missing
