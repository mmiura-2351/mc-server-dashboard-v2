name: api

on:
  pull_request:
    paths:
      - "api/**"
      - "Makefile"
      - ".github/workflows/api.yml"
  push:
    branches: [main]
    paths:
      - "api/**"
      - "Makefile"
      - ".github/workflows/api.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: api

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a commit SHA per
      # docs/dev/DEPENDENCIES.md (pinning + 7-day cooldown).
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv (caches the uv-managed toolchain)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Sync (pinned Python + dev toolchain from uv.lock)
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Import contracts (import-linter)
        run: uv run lint-imports

      - name: Test (pytest)
        run: uv run pytest
