# Single-host container deployment for mc-server-dashboard v2 (issue #189).
#
# Services:
#   db        — PostgreSQL, the API's authoritative metadata store.
#   migrate   — one-shot `alembic upgrade head` (same image as api), runs after db.
#   seaweedfs — the S3-compatible object store the API uses by default (issue #702);
#               gated behind the `object` compose profile (default-on via
#               COMPOSE_PROFILES in .env.example, issue #940).
#   api       — the FastAPI app + control-plane gRPC server, runs after migrate.
#   worker    — the execution agent; container driver only, talks to the host
#               Docker daemon via the mounted socket and creates sibling Minecraft
#               containers.
#   relay     — the game ingress relay (epic #659, issue #960); gated behind the
#               `relay` compose profile (opt-in). Accepts player TCP on :25565,
#               and the Worker dial-back on :25665 (TLS). Requires a wildcard DNS
#               record and TLS material — see docs/dev/DEPLOYMENT.md "Relay".
#   cloudflared — Cloudflare Tunnel for HTTPS access without opening inbound ports
#               (issue #1090); gated behind the `tunnel` compose profile (opt-in).
#               The tunnel is configured in the Cloudflare Zero Trust dashboard;
#               only the tunnel token is needed locally.
#
# Storage backend (issue #702): the shipped default is the `object` backend on the
# SeaweedFS service below (STORAGE.md Section 7.3). To run the fs backend instead,
# see docs/dev/DEPLOYMENT.md "Opting back to the fs backend".
#
# Secrets and host-specific values come from .env (see .env.example). MC server
# containers are NOT compose services: the worker creates them at runtime.
# See docs/dev/DEPLOYMENT.md.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      # `:?` rejects unset OR empty so a blank DB password (which the api's
      # MCD_API_DATABASE__URL is built from) fails loudly rather than booting an
      # unauthenticated/unconnectable DB (#939).
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env, e.g. openssl rand -base64 32}"
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    # Build context is the repo root so the api image's webui stage can reach
    # webui/ (issue #490); the Dockerfile copies the python app from api/.
    build:
      context: .
      dockerfile: api/Dockerfile
    image: mcsd-api:dev
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    environment:
      MCD_API_DATABASE__URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  seaweedfs:
    # The S3-compatible object store backing the default `object` storage backend
    # (issue #702, STORAGE.md Section 7.3). SeaweedFS is Apache-2.0, master/volume,
    # and designed for many small files — the object adapter's hot path is
    # CopyObject-heavy and small-object-heavy (thousands of region/.mca per world).
    # Pinned to an explicit version tag (never `latest`) so a rebuild is
    # reproducible.
    image: chrislusf/seaweedfs:4.33
    restart: unless-stopped
    # Gated behind the `object` compose profile so an fs-backend operator can drop
    # the service entirely (issue #940). `.env.example` ships COMPOSE_PROFILES=object
    # as the default, so the default experience is unchanged: seaweedfs runs and its
    # entrypoint guard enforces non-blank credentials. An fs operator sets
    # COMPOSE_PROFILES= (empty) + MCD_API_STORAGE__BACKEND=fs and is then free of both
    # this service and the running instance — and of the credential requirement (the
    # env below uses `:-`, not `:?`, so `config`/`up` resolve with no keys set).
    profiles: ["object"]
    # All-in-one `server` (master+volume+filer) with the S3 gateway. The S3
    # identities file is written from .env at startup so the access/secret keys
    # live only in .env (matching the db-password posture) and never in the image
    # or a committed config. The bucket is auto-created by SeaweedFS on first PUT,
    # so no init job is needed. Only the S3 port (8333) is reachable on the compose
    # network; master/volume/filer stay internal.
    entrypoint:
      - sh
      - -c
      - |
        # Refuse to write a blank-credential identities file: SeaweedFS 4.33
        # authenticates blank-key clients, so an empty key would boot a silently
        # unauthenticated store. This guard is THE fail-fast for the seaweedfs side:
        # the compose env below uses `:-` (not `:?`) because compose interpolates a
        # service's env even when its profile is inactive, so a `:?` here would break
        # the fs opt-out (empty profile, no creds) at `config`/`up` time (issue #940).
        # This container only runs when the `object` profile is active, so reaching
        # here with blank keys is a real misconfiguration — fail loudly (issue #702).
        if [ -z "$$MCD_API_STORAGE__OBJECT__ACCESS_KEY" ] || [ -z "$$MCD_API_STORAGE__OBJECT__SECRET_KEY" ]; then
          echo "FATAL: MCD_API_STORAGE__OBJECT__ACCESS_KEY/SECRET_KEY must be set to non-empty values (see .env.example)" >&2
          exit 1
        fi
        mkdir -p /etc/seaweedfs
        printf '{"identities":[{"name":"mcsd","credentials":[{"accessKey":"%s","secretKey":"%s"}],"actions":["Admin","Read","Write","List","Tagging"]}]}' \
          "$$MCD_API_STORAGE__OBJECT__ACCESS_KEY" "$$MCD_API_STORAGE__OBJECT__SECRET_KEY" > /etc/seaweedfs/s3.json
        exec weed server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json
    environment:
      # `:-` (empty default), NOT `:?`: compose interpolates a service's env even
      # when its profile is inactive, so a `:?` here would break the fs opt-out
      # (empty profile, no creds) at `config`/`up` time. The blank-key fail-fast for
      # this service is the entrypoint guard above; it runs only under the `object`
      # profile (issue #940, #702).
      MCD_API_STORAGE__OBJECT__ACCESS_KEY: "${MCD_API_STORAGE__OBJECT__ACCESS_KEY:-}"
      MCD_API_STORAGE__OBJECT__SECRET_KEY: "${MCD_API_STORAGE__OBJECT__SECRET_KEY:-}"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      # The S3 gateway's /status returns 200 once it is serving (no auth needed).
      test: ["CMD", "curl", "-fsS", "http://localhost:8333/status"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    # Build context is the repo root so the webui stage can reach webui/
    # (issue #490); the Dockerfile copies the python app from api/.
    build:
      context: .
      dockerfile: api/Dockerfile
    image: mcsd-api:dev
    restart: unless-stopped
    environment:
      MCD_API_DATABASE__URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # `:?` rejects unset OR empty so a blank signing key / worker credential
      # fails loudly here rather than slipping past the api's fail-fast (#939).
      MCD_API_AUTH__TOKEN__SIGNING_KEY: "${MCD_API_AUTH__TOKEN__SIGNING_KEY:?set MCD_API_AUTH__TOKEN__SIGNING_KEY in .env, e.g. openssl rand -base64 48}"
      MCD_API_CONTROL__WORKER_CREDENTIAL: "${MCD_API_CONTROL__WORKER_CREDENTIAL:?set MCD_API_CONTROL__WORKER_CREDENTIAL in .env, e.g. openssl rand -base64 48}"
      # Serve the built SPA from the api origin (no reverse proxy, no CORS): the
      # image builds webui/dist into this path (WEBUI_SPEC 7.7, issue #490).
      MCD_API_WEBUI__DIST_DIR: /app/webui/dist
      # Plaintext gRPC control listener on the private compose network. Cross-host
      # workers require real TLS instead (see docs/dev/DEPLOYMENT.md).
      MCD_API_CONTROL__TLS__INSECURE: "true"
      # The HTTP data-plane base URL advertised to workers for hydrate/snapshot
      # transfers. On the compose network the worker reaches the api by service
      # name.
      MCD_API_SERVER__PUBLIC_BASE_URL: http://api:8000
      # Storage backend (issue #702): the shipped default is `object` on the
      # seaweedfs service. Set MCD_API_STORAGE__BACKEND=fs in .env to opt back to
      # the local-volume fs backend (the fs root + volume below stay wired so the
      # opt-out needs no other change). See docs/dev/DEPLOYMENT.md.
      MCD_API_STORAGE__BACKEND: ${MCD_API_STORAGE__BACKEND:-object}
      MCD_API_STORAGE__FS__ROOT: /data/storage
      # Object-backend wiring (read only when backend=object): the in-compose
      # SeaweedFS S3 gateway, reached by service name on the internal network. The
      # access/secret keys come from .env (matching the db-password posture).
      MCD_API_STORAGE__OBJECT__ENDPOINT: http://seaweedfs:8333
      MCD_API_STORAGE__OBJECT__BUCKET: ${MCD_API_STORAGE__OBJECT__BUCKET:-mcsd}
      # `:-` (empty default), NOT `:?`: this env evaluates ALWAYS, including in fs
      # mode where no creds exist, so a `:?` here would break the fs opt-out
      # (issue #940). The fail-fast for object mode lives where the backend is
      # actually known: the api's `_build_storage` rejects blank object creds at boot
      # (naming the variables), and the seaweedfs entrypoint guard refuses a
      # blank-key identities file when the `object` profile is active (#702).
      MCD_API_STORAGE__OBJECT__ACCESS_KEY: "${MCD_API_STORAGE__OBJECT__ACCESS_KEY:-}"
      MCD_API_STORAGE__OBJECT__SECRET_KEY: "${MCD_API_STORAGE__OBJECT__SECRET_KEY:-}"
      # Relay API-side settings (lands with #956). `:-` defaults so default
      # bring-up is unchanged: ENABLED defaults to `false` and the credential /
      # base domain to empty, leaving the relay off unless explicitly configured.
      MCD_API_RELAY__ENABLED: "${MCD_API_RELAY__ENABLED:-false}"
      MCD_API_RELAY__CREDENTIAL: "${MCD_API_RELAY__CREDENTIAL:-}"
      MCD_API_RELAY__BASE_DOMAIN: "${MCD_API_RELAY__BASE_DOMAIN:-}"
      # Reconciler tuning (issue #985). Defaults preserve existing behavior.
      # To speed self-heal after an API restart, lower HELD_START_GRACE_SECONDS
      # (default 90 s) rather than GRACE_SECONDS (which has a ~630 s safety floor).
      MCD_API_RECONCILER__INTERVAL_SECONDS: "${MCD_API_RECONCILER__INTERVAL_SECONDS:-60}"
      MCD_API_RECONCILER__GRACE_SECONDS: "${MCD_API_RECONCILER__GRACE_SECONDS:-660}"
      MCD_API_RECONCILER__HELD_START_GRACE_SECONDS: "${MCD_API_RECONCILER__HELD_START_GRACE_SECONDS:-90}"
      MCD_API_RECONCILER__BACKOFF_BASE_SECONDS: "${MCD_API_RECONCILER__BACKOFF_BASE_SECONDS:-30}"
      MCD_API_RECONCILER__BACKOFF_MAX_SECONDS: "${MCD_API_RECONCILER__BACKOFF_MAX_SECONDS:-3600}"
      # Game-port auto-assignment range (issue #1002). Defaults match the api's
      # built-in window (25565..25664); set these in .env to shift the range as a
      # fallback (e.g. off the relay's host binds). In relay mode the api already
      # excludes the relay game/tunnel ports from this range automatically.
      MCD_API_PORTS__RANGE_START: "${MCD_API_PORTS__RANGE_START:-25565}"
      MCD_API_PORTS__RANGE_END: "${MCD_API_PORTS__RANGE_END:-25664}"
    volumes:
      - api-storage:/data/storage
    ports:
      - "${API_HTTP_PORT}:8000"      # HTTP REST + /data-plane
      # The gRPC control plane (50051) is intentionally NOT published to the
      # host: the in-compose worker dials api:50051 over the internal network,
      # and the plaintext control listener must never be reachable off-host.
      # A cross-host worker requires control-plane TLS (see docs/dev/DEPLOYMENT.md).
    depends_on:
      migrate:
        condition: service_completed_successfully
      # `required: false` so the api still starts when the `object` profile is off
      # (fs opt-out, issue #940): the dependency is enforced (wait for healthy) only
      # when seaweedfs is part of the active profile set, and ignored otherwise.
      seaweedfs:
        condition: service_healthy
        required: false

  worker:
    build: ./worker
    image: mcsd-worker:dev
    restart: unless-stopped
    environment:
      MCD_WORKER_API_GRPC_ENDPOINT: api:50051
      MCD_WORKER_API_CREDENTIAL: ${MCD_API_CONTROL__WORKER_CREDENTIAL}
      # Plaintext control + data-plane dial on the private compose network.
      MCD_WORKER_API_TLS_INSECURE: "true"
      MCD_WORKER_WORKER_DRIVERS: container
      MCD_WORKER_WORKER_SCRATCH_DIR: ${MCSD_SCRATCH_DIR}
      # Per-Java-major base images for the Minecraft server containers the worker
      # creates. Covers every Java major the worker's bracket table can resolve
      # (javaruntime.MajorsFor): 7/8/11/16/17/21/25. Temurin ships no `16-jre` tag,
      # so major 16 uses `eclipse-temurin:16-jdk` (the closest correct image).
      # Major 7 deviates from the Temurin family because Adoptium publishes no
      # Java 7 image; `azul/zulu-openjdk:7` provides the JRE MC <= 1.7.9 needs.
      MCD_WORKER_DRIVER_CONTAINER_IMAGES: "25=eclipse-temurin:25-jre,21=eclipse-temurin:21-jre,17=eclipse-temurin:17-jre,16=eclipse-temurin:16-jdk,11=eclipse-temurin:11-jre,8=eclipse-temurin:8-jre,7=azul/zulu-openjdk:7"
      # Publish each server's game port on all host interfaces so players connect
      # from outside the host (the code default is 127.0.0.1, loopback-only). The
      # host firewall governs which game ports are actually reachable. RCON always
      # stays on loopback regardless of this value.
      # Set MCD_WORKER_GAME_BIND_IP=127.0.0.1 in .env when the relay is enabled
      # (relay path: Worker dials its own loopback, no inbound game-port range needed).
      MCD_WORKER_DRIVER_CONTAINER_GAME_BIND_IP: "${MCD_WORKER_GAME_BIND_IP:-0.0.0.0}"
      # Attach the MC containers the worker creates to the compose network (pinned
      # to "mcsd" below) so RCON is reached over the docker network at the
      # container's name, never the host loopback. Inside this containerized worker
      # the host loopback is the worker's own namespace, so the historical
      # loopback-published RCON is unreachable (issue #218). With this set the
      # worker also DROPS the host RCON publication: RCON never leaves the network.
      MCD_WORKER_DRIVER_CONTAINER_NETWORK: mcsd
    # The Docker socket is how the container driver creates sibling MC containers.
    # group_add gives the worker process the host docker group so it can use the
    # socket without running privileged.
    group_add:
      - "${DOCKER_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # The scratch dir MUST be bind-mounted at the SAME absolute path on host and
      # in-container: the worker tells the Docker daemon to bind a server's working
      # dir into its MC container, and the daemon resolves that bind against HOST
      # paths. Identical paths make the worker's in-container path a valid host
      # path. The worker-id under it also survives container recreation this way.
      - ${MCSD_SCRATCH_DIR}:${MCSD_SCRATCH_DIR}
    # init: true injects Docker's tini as PID 1 so it reaps zombie grandchildren
    # (e.g. processes re-parented from Forge installer forks) that exec.Cmd.Wait
    # cannot reap because the worker itself runs as PID 1 without an init.
    init: true
    depends_on:
      - api

  relay:
    build: ./relay
    image: mcsd-relay:dev
    restart: unless-stopped
    # Gated behind the `relay` compose profile so default bring-up is unchanged
    # (issue #960, epic #659). Add `relay` to COMPOSE_PROFILES in .env to enable
    # it, then configure the required relay keys in .env (see .env.example and
    # docs/dev/DEPLOYMENT.md "Relay").
    profiles: ["relay"]
    environment:
      MCD_RELAY_API_GRPC_ENDPOINT: api:50051
      # `:-` (empty default), NOT `:?`: compose interpolates a service's env even
      # when its profile is inactive, so a `:?` here would break plain
      # `docker compose config` / `up` when the relay profile is off (same
      # reason as the seaweedfs object keys, issue #940). The blank-credential
      # fail-fast for this service is the relay binary's own config validation,
      # which refuses an empty api.credential at startup. Only runs under the
      # `relay` profile, so reaching here with a blank key is a real
      # misconfiguration — the relay exits immediately with a clear error.
      MCD_RELAY_API_CREDENTIAL: "${MCD_API_RELAY__CREDENTIAL:-}"
      # Plaintext control dial on the private compose network (same posture as
      # the worker; the gRPC port is not published to the host).
      MCD_RELAY_API_TLS_INSECURE: "true"
      MCD_RELAY_TUNNEL_PUBLIC_ENDPOINT: "${MCD_RELAY_TUNNEL_PUBLIC_ENDPOINT:-}"
      # Tunnel TLS material (cert + key) are bind-mounted by the operator into
      # /etc/mcsd/; self-signed is fine — the CA travels in-band to Workers.
      MCD_RELAY_TUNNEL_TLS_CERT_FILE: /etc/mcsd/tunnel-cert.pem
      MCD_RELAY_TUNNEL_TLS_KEY_FILE: /etc/mcsd/tunnel-key.pem
    volumes:
      # Mount the tunnel TLS material (self-signed or CA-issued) from the host.
      # Generate once: see docs/dev/DEPLOYMENT.md "Relay — TLS material".
      # The operator sets MCD_RELAY_TLS_DIR in .env to the host directory that
      # contains tunnel-cert.pem and tunnel-key.pem.
      - "${MCD_RELAY_TLS_DIR:-/etc/mcsd/relay}:/etc/mcsd:ro"
    ports:
      - "25565:25565"    # game listener (players join here)
      - "25665:25665"    # tunnel listener (Workers dial back here)
    depends_on:
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Gated behind the `tunnel` compose profile so default bring-up is unchanged
    # (issue #1090). Add `tunnel` to COMPOSE_PROFILES in .env to enable it, then
    # set CLOUDFLARE_TUNNEL_TOKEN in .env (see .env.example). The tunnel's public
    # hostname and routing are configured in the Cloudflare Zero Trust dashboard;
    # only the token is needed locally.
    profiles: ["tunnel"]
    # `:-` (empty default), NOT `:?`: compose interpolates a service's command
    # even when its profile is inactive, so a `:?` here would break plain
    # `docker compose config` / `up` when the tunnel profile is off (same
    # reason as the relay credential, issue #940). The blank-token fail-fast
    # for this service is cloudflared itself, which refuses an empty token at
    # startup. Only runs under the `tunnel` profile.
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      api:
        condition: service_started

volumes:
  db-data:
  api-storage:
  seaweedfs-data:

networks:
  # Pin the compose default network's name so the worker can attach the sibling
  # MC containers it creates (via the Docker socket) to the SAME user-defined
  # network and reach their RCON by container name (issue #218). User-defined
  # networks provide container-name DNS; the default bridge does not.
  # CAUTION: renaming the default network recreates every service container on the
  # next `docker compose up` (the old default network is replaced).
  default:
    name: mcsd
