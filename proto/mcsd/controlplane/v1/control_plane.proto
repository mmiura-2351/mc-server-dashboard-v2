// The Minecraft Server Dashboard v2 control-plane contract.
//
// A single Worker-initiated gRPC bidirectional stream multiplexes API->Worker
// commands and Worker->API events (REQUIREMENTS.md Section 5.1). Registration is
// the first Worker->API message; thereafter the stream carries commands,
// command results, and asynchronous events (status / log / metrics / heartbeat).
//
// See docs/app/CONTROL_PLANE.md for the stream lifecycle, message-flow diagrams,
// and the requirement-by-requirement mapping. This file is the binding contract;
// the doc explains it.
syntax = "proto3";

package mcsd.controlplane.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// WorkerService is the only control-plane service. Workers dial the API and open
// the persistent stream; the API never dials a Worker (Workers have no inbound
// exposure, REQUIREMENTS.md Section 5.1).
service WorkerService {
  // Session is the single bidirectional stream for one connected Worker. The
  // Worker sends WorkerMessage values (starting with a Register), the API sends
  // ApiMessage values (commands). Closing the stream disconnects the Worker.
  rpc Session(stream WorkerMessage) returns (stream ApiMessage);
}

// ---------------------------------------------------------------------------
// Envelopes
// ---------------------------------------------------------------------------

// WorkerMessage is every message a Worker sends to the API over the stream.
// Exactly one payload field is set.
message WorkerMessage {
  // correlation_id ties a flow together end to end (REQUIREMENTS.md NFR-OBS-1).
  // For a command_result it MUST equal the originating ApiCommand.command_id so
  // the API can match a result to its command. For unsolicited events it is a
  // fresh id the API can log and trace.
  string correlation_id = 1;

  // emitted_at is the Worker's clock reading when the message was produced.
  google.protobuf.Timestamp emitted_at = 2;

  oneof payload {
    // Register MUST be the first message on a fresh stream (FR-WRK-1).
    Register register = 3;
    // CommandResult answers an ApiCommand (success or error).
    CommandResult command_result = 4;
    // Event is an asynchronous status / log / metrics / heartbeat report.
    Event event = 5;
  }
}

// ApiMessage is every message the API sends to a Worker over the stream.
// Exactly one payload field is set.
message ApiMessage {
  // correlation_id traces the flow (REQUIREMENTS.md NFR-OBS-1). For a command it
  // is the same value as the command's command_id; for register_ack it echoes
  // the Register message's correlation_id.
  string correlation_id = 1;

  // sent_at is the API's clock reading when the message was produced.
  google.protobuf.Timestamp sent_at = 2;

  oneof payload {
    // RegisterAck accepts or rejects a Register (sent first, in response).
    RegisterAck register_ack = 3;
    // ApiCommand instructs the Worker to act on a server.
    ApiCommand api_command = 4;
  }
}

// ---------------------------------------------------------------------------
// Registration & capability advertisement (FR-WRK-1)
// ---------------------------------------------------------------------------

// Register is the Worker's opening message: who it is and what it can run.
message Register {
  // worker_id is the stable identifier the Worker registers under
  // (CONFIGURATION.md Section 6.1 worker.id).
  string worker_id = 1;

  // worker_version is the Worker build/release string, for fleet visibility.
  string worker_version = 2;

  // capabilities advertises the drivers and resources the API's greedy
  // placement filters on (FR-WRK-3).
  WorkerCapabilities capabilities = 3;

  // held_servers advertises the working sets the Worker already holds in its
  // persistent local scratch at registration, each tagged with the GENERATION the
  // local working set is at (issue #763). The API uses this to skip the
  // destructive hydrate on a same-worker restart — hydrating would unpack the last
  // authoritative snapshot over the Worker's LIVE, newer working set and roll the
  // world back — but ONLY when the held generation is fresh enough: the reconciler
  // hydrates whenever the held generation is older than the authoritative store
  // generation (presence at a stale generation, e.g. an A->B->A leftover scratch,
  // is NOT fresh enough). This generalizes the presence-only skip of issue #696,
  // which was correct only because the one A->B->A path always re-placed through a
  // hydrate; carrying the generation keeps it correct under any future flow.
  //
  // This REPLACES the prior `repeated string held_server_ids` (issue #696): a wire
  // break, justified because api/ and worker/ ship together (CONTRIBUTING.md) and a
  // clean replacement is simpler than a parallel field. An older Worker that does
  // not set held_servers reports holding nothing, so the API hydrates as before —
  // never silently booting a fresh/empty world.
  repeated HeldServer held_servers = 4;
}

// HeldServer is one working set the Worker holds in local scratch, with the
// generation it is at (issue #763). The generation is the authoritative store
// generation the working set was last hydrated from or last snapshotted to: it is
// stamped by the API data plane on each transfer and persisted by the Worker
// alongside the scratch, so a same-worker restart re-reports it and a scratch GC
// (issue #762) drops it. generation 0 means "held but at an unknown generation"
// (e.g. a scratch that predates this field): the API treats 0 as older than any
// published store generation and hydrates.
message HeldServer {
  // server_id is the API's identifier for the held server.
  string server_id = 1;
  // generation is the working-set generation in the Worker's scratch.
  uint64 generation = 2;
}

// WorkerCapabilities is what a Worker advertises at registration (FR-WRK-1).
message WorkerCapabilities {
  // drivers is the set of execution backends this Worker offers
  // (CONFIGURATION.md Section 6.2 worker.drivers).
  repeated ExecutionDriverKind drivers = 1;

  // max_servers is the Worker's free-capacity hint for placement; 0 means "no
  // advertised cap" (CONFIGURATION.md Section 6.2 worker.max_servers).
  uint32 max_servers = 2;

  // resources advertises host resources for placement and monitoring.
  HostResources resources = 3;
}

// HostResources is a coarse description of a Worker host's resources.
message HostResources {
  // cpu_cores is the number of logical CPUs available to the Worker.
  uint32 cpu_cores = 1;
  // memory_bytes is the total memory available to the Worker.
  uint64 memory_bytes = 2;
}

// ExecutionDriverKind enumerates the execution backends (FR-EXE-2, FR-EXE-4).
enum ExecutionDriverKind {
  EXECUTION_DRIVER_KIND_UNSPECIFIED = 0;
  // HOST_PROCESS named the host-process driver, removed in issue #781. The
  // number stays reserved (the enum is NOT renumbered) to preserve wire
  // compatibility, but no Worker advertises it and no shipped driver maps to it.
  EXECUTION_DRIVER_KIND_HOST_PROCESS = 1;
  EXECUTION_DRIVER_KIND_CONTAINER = 2;
}

// RegisterAck accepts or rejects a registration.
message RegisterAck {
  // accepted is true when the API admitted this Worker into the registry.
  bool accepted = 1;

  // heartbeat_interval is how often the API expects a HEARTBEAT event. The API
  // marks the Worker disconnected after it misses heartbeats past its liveness
  // window (CONFIGURATION.md Section 5.1 control.heartbeat_timeout_seconds,
  // FR-WRK-2).
  google.protobuf.Duration heartbeat_interval = 2;

  // rejection_reason explains a refusal (e.g. bad credential, duplicate id);
  // empty when accepted is true.
  string rejection_reason = 3;

  // transfer_deadline bounds a single data-plane transfer (the snapshot upload
  // and the hydrate download) Worker-side. The API derives it from its own
  // hydrate/snapshot budgets plus a small margin, so it is always >= the API
  // budget: the API-side timeout fires first and this Worker bound is the
  // cleanup backstop that structurally closes the unbounded-upload case (an
  // upload outliving snapshot_timeout_seconds indefinitely, #874/#869). The
  // Worker applies it as a per-transfer context deadline; a non-positive or
  // unset value (an older API) leaves the transfer unbounded as before.
  google.protobuf.Duration transfer_deadline = 4;
}

// ---------------------------------------------------------------------------
// Commands: API -> Worker (FR-SRV-2, FR-SRV-5, Section 6.9, Section 7.2)
// ---------------------------------------------------------------------------

// ApiCommand is one instruction the Worker must act on and answer with a
// CommandResult carrying the same command_id.
message ApiCommand {
  // command_id correlates this command with its CommandResult
  // (REQUIREMENTS.md NFR-OBS-1).
  string command_id = 1;

  // server_id is the API's identifier for the target server. Set for every
  // per-server command; empty only for future fleet-wide commands.
  string server_id = 2;

  oneof command {
    StartServer start = 3;
    StopServer stop = 4;
    RestartServer restart = 5;
    // ServerCommand forwards an RCON / console command (FR-SRV-5).
    ServerCommand server_command = 6;
    // Hydrate triggers the Worker to pull the working set from the API data
    // plane before launch (FR-DATA-4). The bulk transfer itself rides the HTTP
    // data plane, not this stream (Section 5.1).
    HydrateTrigger hydrate = 7;
    // Snapshot triggers the Worker to push its working set back to the API data
    // plane (FR-DATA-4, FR-DATA-7).
    SnapshotTrigger snapshot = 8;
    // ReadFile reads from a running server's live working set (Section 7.2).
    ReadFile read_file = 9;
    // EditFile writes to a running server's live working set (Section 7.2).
    EditFile edit_file = 10;
    // ListFiles browses a directory in a running server's live working set
    // (Section 6.9, Section 7.2).
    ListFiles list_files = 11;
  }
}

// StartServer launches a server on the Worker. Hydrate (FR-DATA-4) precedes the
// launch; the API issues a HydrateTrigger first, then StartServer.
message StartServer {
  // driver is the execution backend to use; it MUST be one the Worker
  // advertised (FR-EXE-3 fixes it per server).
  ExecutionDriverKind driver = 1;

  // jar_relpath is the server JAR path inside the hydrated working set. The API
  // owns JAR retrieval and ships it via hydrate; the Worker never fetches it
  // (ARCHITECTURE.md Section 7.3).
  string jar_relpath = 2;

  // minecraft_version lets the Worker pick the Java runtime (FR-EXE-5); the API
  // does not choose the java binary.
  string minecraft_version = 3;

  // launch_mode selects how the Worker launches the server (a vanilla/Paper JAR
  // launch vs a Forge args-file launch with a supervised installer step). It is
  // carried explicitly on the command, never inferred from the working-set
  // contents. LAUNCH_MODE_UNSPECIFIED is treated as LAUNCH_MODE_JAR for
  // backwards compatibility: a Worker launching it behaves exactly as it did
  // before this field existed (a `java -jar <jar> nogui` launch).
  LaunchMode launch_mode = 4;

  // memory_limit_bytes is the per-server memory ceiling (the container/process
  // limit) the operator declared on the server config (issue #706, epic #704).
  // It carries operator intent — the LIMIT, not a pre-computed JVM flag — and
  // the Worker derives the JVM heap (`-Xmx = limit − headroom`) from it. 0/unset
  // means "the driver picks a default" (the JVM default heap, today's behavior),
  // so a command from an API that does not set the field is unchanged. Driver
  // enforcement of the ceiling (Docker `Memory`, host limits) is later sub-issues
  // (#707/#708) and not implied by this field alone.
  uint64 memory_limit_bytes = 5;

  // cpu_millis is the per-server CPU allocation in millicores (1000 = one core)
  // the operator declared on the server config (issue #723, epic #704). It is a
  // SOFT, relative allocation (owner decision 2026-06-09), not a hard quota: the
  // Worker carries it as-is — there is NO derivation step (unlike the JVM heap
  // from memory_limit_bytes) — and the enforcement driver (#724) turns it into a
  // relative CPUShares weight. 0/unset means "no per-server allocation → the
  // driver's default weight", so a command from an API that does not set the
  // field is unchanged.
  uint32 cpu_millis = 6;
}

// LaunchMode selects how the Worker launches a server's process (issue #305).
// It is additive: a Worker that does not understand a value falls back to the
// JAR launch its older code already implemented (UNSPECIFIED == JAR).
enum LaunchMode {
  // Unspecified is treated as LAUNCH_MODE_JAR (backwards compatibility).
  LAUNCH_MODE_UNSPECIFIED = 0;
  // Jar runs `java -jar <jar_relpath> nogui` directly (vanilla, Paper, etc.).
  LAUNCH_MODE_JAR = 1;
  // ForgeArgsfile runs the Forge launch via its generated unix args file,
  // discovered under libraries/net/minecraftforge/forge/*/unix_args.txt in the
  // working set. When that args file is absent the working set is uninstalled,
  // so the Worker first runs `java -jar <jar_relpath> --installServer` as a
  // supervised phase of the start, then launches via the now-present args file.
  LAUNCH_MODE_FORGE_ARGSFILE = 2;
}

// StopServer stops a running server. A graceful stop takes an event-driven
// snapshot before exit (FR-DATA-7); set force to skip the graceful path.
message StopServer {
  bool force = 1;
}

// RestartServer stops then starts the server in place.
message RestartServer {}

// ServerCommand forwards a console / RCON command to the running server
// (FR-SRV-5). The output is returned in the CommandResult.
message ServerCommand {
  // line is the raw command line sent to the server console (e.g. "say hi").
  string line = 1;
}

// HydrateTrigger tells the Worker to pull a server's working set from the API
// data plane into local scratch (FR-DATA-4). transfer_url and transfer_token
// address the API-terminated HTTP data-plane endpoint (Section 5.1); the bulk
// bytes never traverse this stream.
message HydrateTrigger {
  string transfer_url = 1;
  // transfer_token is a short-lived credential authorizing this one transfer.
  string transfer_token = 2;
}

// SnapshotTrigger tells the Worker to push its working set back to the API data
// plane (FR-DATA-4, FR-DATA-7). For a running server the Worker performs
// save-all over RCON first (Section 6.9).
message SnapshotTrigger {
  string transfer_url = 1;
  string transfer_token = 2;
}

// ReadFile reads a path from a running server's live working set (Section 7.2).
// Path-traversal protection is enforced on the Worker side (FR-FILE-4).
message ReadFile {
  // path is relative to the server's working-set root.
  string path = 1;
}

// EditFile writes content to a path in a running server's live working set
// (Section 7.2). Path-traversal protection is enforced on the Worker side
// (FR-FILE-4).
message EditFile {
  string path = 1;
  bytes content = 2;
}

// ListFiles lists the entries of a directory in a running server's live working
// set (Section 6.9, Section 7.2). The listing comes back in the CommandResult's
// file_listing. Path-traversal protection is enforced on the Worker side
// (FR-FILE-4); the listing is read-only.
message ListFiles {
  // path is the directory relative to the server's working-set root; "." (or
  // empty) lists the root itself.
  string path = 1;
}

// ---------------------------------------------------------------------------
// Command results: Worker -> API
// ---------------------------------------------------------------------------

// CommandResult answers exactly one ApiCommand. The enclosing WorkerMessage's
// correlation_id equals the command's command_id.
message CommandResult {
  // success is true when the command was applied without error.
  bool success = 1;

  // error describes the failure; absent when success is true.
  CommandError error = 2;

  // result carries command-specific output, when the command produces any.
  oneof result {
    // command_output is the console/RCON output for a ServerCommand.
    string command_output = 3;
    // file_content is the bytes read for a ReadFile.
    bytes file_content = 4;
    // file_listing is the directory listing for a ListFiles.
    FileListing file_listing = 5;
  }
}

// FileListing is the directory listing returned for a ListFiles command. Entries
// are unordered; the API sorts for display.
message FileListing {
  // entries are the directory's immediate children (not recursive).
  repeated FileEntry entries = 1;

  // truncated is true when the directory held more than the Worker's per-listing
  // cap and entries was clipped to that cap. The browse view shows a partial
  // listing rather than refusing an enormous directory.
  bool truncated = 2;
}

// FileEntry is one child of a listed directory. The shape mirrors the API's
// authoritative-Storage listing (name, is_dir, size) so a running-server listing
// and an at-rest listing unify into one response shape.
message FileEntry {
  // name is the entry's base name (no path separators).
  string name = 1;

  // is_dir is true for a subdirectory, false for a regular file.
  bool is_dir = 2;

  // size is the file size in bytes; 0 for a directory.
  uint64 size = 3;
}

// CommandError reports why a command failed (NFR-OBS-1 error reporting).
message CommandError {
  // code classifies the failure for programmatic handling.
  CommandErrorCode code = 1;
  // message is a human-readable explanation for logs and operators.
  string message = 2;
  // file_access_reason refines a FILE_ACCESS_DENIED failure into the specific
  // condition the Worker hit (is-a-directory, symlink refusal, oversized
  // payload, etc.) so the API can surface an honest problem reason rather than
  // collapsing every file denial into "invalid path" (issue #548). It is only
  // meaningful when code is COMMAND_ERROR_CODE_FILE_ACCESS_DENIED; for every
  // other code it is UNSPECIFIED. The field is additive: an older Worker that
  // leaves it UNSPECIFIED, and a genuine traversal/path denial, both map back to
  // the pre-existing invalid-path behaviour.
  FileAccessReason file_access_reason = 3;
}

// FileAccessReason refines a FILE_ACCESS_DENIED failure (issue #548). The Worker
// emits FILE_ACCESS_DENIED for several conditions that are NOT path-syntax
// problems; this enum carries which one so the API maps each to an honest
// problem reason and HTTP status instead of a misleading "invalid path".
enum FileAccessReason {
  // Unspecified is the default for a non-file failure and for a genuine path
  // denial (a traversal-unsafe path: absolute, a ".." component, or a
  // resolution refusal). The API maps it to 422 invalid_path, the historical
  // behaviour, so an older Worker that never sets this field is unchanged.
  FILE_ACCESS_REASON_UNSPECIFIED = 0;
  // The target path resolves to a directory where a file was required (a read or
  // an edit of a directory). The API maps it to 422 is_a_directory.
  FILE_ACCESS_REASON_IS_A_DIRECTORY = 1;
  // The target path resolves to a regular file where a directory was required (a
  // list of a file). The API maps it to 422 not_a_directory.
  FILE_ACCESS_REASON_NOT_A_DIRECTORY = 2;
  // The Worker refused to follow a symlink on the final or an intermediate path
  // component (the escape-vector defence, FR-FILE-4). The API maps it to 422
  // symlink_refused.
  FILE_ACCESS_REASON_SYMLINK_REFUSED = 3;
  // The read result or the edit payload exceeds the control-plane file cap. The
  // API maps it to 413 file_too_large.
  FILE_ACCESS_REASON_PAYLOAD_TOO_LARGE = 4;
}

// CommandErrorCode classifies a command failure.
enum CommandErrorCode {
  COMMAND_ERROR_CODE_UNSPECIFIED = 0;
  // The target server is not known to this Worker.
  COMMAND_ERROR_CODE_SERVER_NOT_FOUND = 1;
  // The command is invalid for the server's current state (e.g. start a
  // running server, RCON on a stopped one).
  COMMAND_ERROR_CODE_INVALID_STATE = 2;
  // The requested execution driver is not available on this Worker.
  COMMAND_ERROR_CODE_DRIVER_UNAVAILABLE = 3;
  // A file path was rejected (traversal / not found / not permitted).
  COMMAND_ERROR_CODE_FILE_ACCESS_DENIED = 4;
  // A hydrate/snapshot data-plane transfer failed.
  COMMAND_ERROR_CODE_TRANSFER_FAILED = 5;
  // The Worker failed to apply the command for an unclassified reason.
  COMMAND_ERROR_CODE_INTERNAL = 6;
  // A StartServer could not publish a host port because it is already in use
  // (e.g. two servers sharing server-port on one Worker). Sanitized from the
  // container driver's start error; the raw daemon text stays in Worker logs.
  COMMAND_ERROR_CODE_PORT_CONFLICT = 7;
  // A StartServer could not find or pull the container image for the server's
  // Minecraft/Java version. Sanitized from the container driver's create error;
  // the raw daemon text stays in Worker logs.
  COMMAND_ERROR_CODE_IMAGE_MISSING = 8;
  // Another mutating lifecycle command is already in flight for this server, so
  // the Worker refused this one without applying it (issue #824). Distinct from
  // INVALID_STATE: the id is RESERVED (a re-issued duplicate after a stream
  // reconnect, or a detached stop still confirming termination), not in a
  // settled state like "already running". The outcome of the in-flight command
  // is not yet known, so the API must NOT converge an observed state on it — it
  // keeps the assignment/intent and retries on a later reconcile tick.
  COMMAND_ERROR_CODE_BUSY = 9;
}

// ---------------------------------------------------------------------------
// Events: Worker -> API (FR-MON-1..3, FR-WRK-2, FR-SRV-4)
// ---------------------------------------------------------------------------

// Event is an asynchronous report from a Worker, not tied to a command.
message Event {
  // server_id scopes the event to a server; empty for Worker-wide events such
  // as a heartbeat.
  string server_id = 1;

  oneof event {
    // StatusChange reports an observed server-state transition (FR-SRV-4,
    // FR-MON-1).
    StatusChange status_change = 2;
    // LogLine streams a line of server output (FR-MON-2).
    LogLine log_line = 3;
    // Metrics reports basic runtime metrics (FR-MON-3).
    Metrics metrics = 4;
    // Heartbeat is the liveness signal (FR-WRK-2).
    Heartbeat heartbeat = 5;
  }
}

// StatusChange reports the Worker's observed runtime state for a server
// (FR-SRV-4). The API holds desired state; this is the observed side.
message StatusChange {
  ServerState state = 1;
  // detail optionally explains the transition (e.g. a crash reason).
  string detail = 2;
}

// ServerState is the observed runtime state of a server (FR-SRV-4:
// running / stopped / starting / crashed, plus the in-between transitions and a
// restarting state the lifecycle commands produce). This is the full set of
// values a Worker can report. The API caches the last-reported value in
// Server.observed_state (DATABASE.md); that column also allows "unknown", which
// is an API-side inference (set when the owning Worker disconnects), never
// reported by a Worker, so it is intentionally not a value here.
enum ServerState {
  SERVER_STATE_UNSPECIFIED = 0;
  SERVER_STATE_STARTING = 1;
  SERVER_STATE_RUNNING = 2;
  SERVER_STATE_STOPPING = 3;
  SERVER_STATE_STOPPED = 4;
  SERVER_STATE_RESTARTING = 5;
  SERVER_STATE_CRASHED = 6;
}

// LogLine is a single line of a server's console output (FR-MON-2).
message LogLine {
  // line is the raw log text without a trailing newline.
  string line = 1;
  // stream distinguishes stdout from stderr.
  LogStream stream = 2;
}

// LogStream identifies which output stream a LogLine came from.
enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0;
  LOG_STREAM_STDOUT = 1;
  LOG_STREAM_STDERR = 2;
}

// Metrics is a basic runtime metrics sample for a server (FR-MON-3). Fields are
// best-effort; a Worker that cannot measure one leaves it zero.
message Metrics {
  // cpu_millis is CPU usage in thousandths of a core (1000 == one full core).
  uint32 cpu_millis = 1;
  // memory_bytes is the resident memory of the server process.
  uint64 memory_bytes = 2;
  // player_count is the number of connected players, when known.
  uint32 player_count = 3;
}

// Heartbeat is the periodic liveness signal (FR-WRK-2). Its cadence is the
// heartbeat_interval the API returned in RegisterAck.
message Heartbeat {}
