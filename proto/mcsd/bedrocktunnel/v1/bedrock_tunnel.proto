// The Minecraft Server Dashboard v2 Worker<->relay Bedrock tunnel handshake
// (epic #1540, issue #1545).
//
// Unlike mcsd.controlplane.v1 (Worker<->API) and mcsd.relay.v1 (relay<->API),
// this package is NOT served over gRPC. It is exchanged directly on a QUIC
// connection the Worker dials to the relay's Bedrock tunnel listener
// (docs/app/BEDROCK_TUNNEL.md): after the QUIC/TLS handshake completes, the
// Worker opens the first bidirectional stream and writes a TunnelHello; the
// relay answers on the same stream with a TunnelHelloAck, then closes the
// stream. Bulk RakNet traffic afterward rides QUIC DATAGRAM frames (RFC
// 9221), not streams — see the framing note on TunnelHello below.
//
// Stream wire format: each message (in either direction) is a 4-byte
// big-endian length prefix followed by that many bytes of protobuf-marshaled
// message data. This is the ONLY message exchanged on the stream in each
// direction; the stream is closed immediately after (both sides), so no
// further framing state is needed.
//
// Datagram wire format (the actual RakNet traffic, once TunnelHelloAck.accepted
// is true): every QUIC DATAGRAM frame (RFC 9221) on the connection, in either
// direction, is a 4-byte big-endian flow id followed by an opaque RakNet
// payload -- neither this package nor the relay parses RakNet itself. The
// RELAY assigns flow ids, one per distinct Bedrock client source address
// (ip:port) seen on the bound bedrock_port, for the life of that client's
// idle window; the Worker does not mint flow ids, it only echoes back the flow
// id it received on inbound datagrams when it sends the corresponding reply.
// An unrecognized flow id from the Worker (e.g. after the relay evicted an
// idle client) is dropped. Flow ids are CONNECTION-scoped: they restart from
// zero on every new QUIC connection, so the Worker MUST discard any flow-id
// state it holds when it redials -- an id carried across a reconnect would
// misroute. See docs/app/BEDROCK_TUNNEL.md for the full design: topology,
// ALPN, TLS material reuse, and the chosen datagram MTU.
syntax = "proto3";

package mcsd.bedrocktunnel.v1;

// TunnelHello is the Worker's opening message on the first bidirectional QUIC
// stream after connecting to the relay's Bedrock tunnel listener. It declares
// the credential the API minted when it dispatched
// mcsd.controlplane.v1.OpenBedrockTunnel to the Worker; the relay confirms it
// against the API via mcsd.relay.v1.RelayService.ValidateBedrockTunnel before
// binding the public UDP port (docs/app/BEDROCK_TUNNEL.md).
//
// The Worker MAY redial and resend TunnelHello with the same token after a
// transient QUIC disconnect -- unlike the per-player Java tunnel token
// (single-use, mcsd.relay.v1), this token is valid for the whole tunnel
// lifetime (open -> a matching CloseBedrockTunnel), so validation must accept
// a repeated presentation of the same (server_id, bedrock_port, token).
message TunnelHello {
  // server_id identifies the local server whose Bedrock (Geyser/RakNet) port
  // the Worker forwards over this tunnel. Matches
  // mcsd.controlplane.v1.OpenBedrockTunnel.server_id.
  string server_id = 1;

  // bedrock_port is the public UDP port the relay binds and routes to this
  // connection. Matches mcsd.controlplane.v1.OpenBedrockTunnel.bedrock_port.
  uint32 bedrock_port = 2;

  // token is the credential the API minted and the relay validates via
  // ValidateBedrockTunnel. Matches mcsd.controlplane.v1.OpenBedrockTunnel.token.
  string token = 3;
}

// TunnelHelloAck is the relay's reply on the same stream.
message TunnelHelloAck {
  // accepted is true when the relay has bound (or already holds) the public
  // UDP port for the declared bedrock_port and datagram forwarding is live.
  // The Worker may then exchange RakNet datagrams (see TunnelHello's framing
  // note) until the QUIC connection closes.
  bool accepted = 1;

  // reject_reason explains a refusal (invalid credential, port already bound
  // by a different connection, etc.); empty when accepted is true. The relay
  // closes the QUIC connection immediately after sending a rejecting ack (or
  // without sending one at all, for a malformed/oversized hello).
  string reject_reason = 2;
}
