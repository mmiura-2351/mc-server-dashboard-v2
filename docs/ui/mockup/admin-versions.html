<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Versions &amp; JARs — MC Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="admin-versions">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content">
      <div class="page-head">
        <div>
          <h1>Versions &amp; JARs</h1>
          <div class="sub">Version catalog and shared server downloads — platform administrators only</div>
        </div>
        <div class="actions">
          <button class="btn" onclick="mockToast('POST /versions/refresh — all catalogs invalidated')">Refresh all catalogs</button>
        </div>
      </div>

      <div class="card" style="padding:0;margin-bottom:14px">
        <table class="data">
          <thead><tr><th>Server type</th><th>Versions</th><th>Latest</th><th></th></tr></thead>
          <tbody id="catalog-rows"></tbody>
        </table>
      </div>

      <div class="card" style="max-width:360px">
        <h2>Server downloads</h2>
        <dl class="kv">
          <dt>Downloaded JARs</dt><dd>14</dd>
          <dt>Total size</dt><dd>1.9 GiB</dd>
        </dl>
        <div style="margin-top:12px">
          <p style="font-size:12px;color:var(--text-faint);margin:0 0 8px">Are you sure? This deletes downloaded server JARs that no server uses any more.</p>
          <button class="btn" onclick="mockToast('Freed 412 MiB by deleting 3 unused JARs.', 'ok')">Free up disk space</button>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="assets/mock-data.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("catalog-rows").innerHTML =
    Object.entries(MOCK.versionCatalog).map(([type, c]) => `
      <tr>
        <td><span class="badge type">${type}</span></td>
        <td class="num">${c.count}</td>
        <td class="num">${c.latest}</td>
        <td class="row-actions">
          <button class="btn sm" onclick="mockToast('POST /versions/refresh?server_type=${type}')">Refresh</button>
        </td>
      </tr>`).join("");
});
</script>
</body>
</html>
