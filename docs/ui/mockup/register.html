<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — MC Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="brand"><span class="cube"></span>Create your account</div>
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="username">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="min. 12 characters">
      <div class="hint">At least 12 characters. Must not contain your username or email. Common passwords are rejected.</div>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password">
    </div>
    <button class="btn primary" style="width:100%;justify-content:center" onclick="location.href='dashboard.html'">Create account</button>
    <div class="alt">Already registered? <a href="login.html">Sign in</a></div>
  </div>
</div>
</body>
</html>
