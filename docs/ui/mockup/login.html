<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — MC Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="brand"><span class="cube"></span>MC Server Dashboard</div>
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="username" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="••••••••">
      <div class="error" style="display:none" id="login-err">Invalid username or password.</div>
    </div>
    <button class="btn primary" style="width:100%;justify-content:center" onclick="location.href='dashboard.html'">Sign in</button>
    <div class="alt">No account? <a href="register.html">Register</a></div>
  </div>
</div>
</body>
</html>
