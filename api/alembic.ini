# Alembic configuration for the api/ persistence schema.
#
# The database URL is NOT stored here: it is a secret supplied via configuration
# (CONFIGURATION.md Section 3) and read in migrations/env.py from the same
# MCD_API_ environment the app uses. Entity tables land with their features
# (DATABASE.md); this baseline is intentionally empty.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
